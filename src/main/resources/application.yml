server:
  port: 8080

spring:
  application:
    name: finance-dashboard

  datasource:
    url: jdbc:h2:file:./data/financedb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

app:
  jwt:
    secret: "3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b"
    expiration-ms: 86400000   # 24 hours

logging:
  level:
    com.finance: DEBUG
    org.springframework.security: INFO
